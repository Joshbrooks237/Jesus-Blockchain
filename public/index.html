<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCO Ledger</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
    header h1 { margin: 0 0 4px; font-size: 28px; letter-spacing: -0.5px; }
    header p { margin: 0 0 28px; color: var(--muted); }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 14px;
      resize: vertical;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent);
      color: #04101f;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: default; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .row h2 { font-size: 16px; margin: 0; }
    .entry {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      background: var(--bg);
    }
    .entry .meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .entry .author { color: var(--accent); font-weight: 600; }
    .entry .content { white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; }
    .hash { font-family: var(--mono); font-size: 11px; color: var(--muted); word-break: break-all; }
    .hash b { color: #7ee787; }
    .empty { color: var(--muted); text-align: center; padding: 24px; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel); border: 1px solid var(--border);
      padding: 10px 18px; border-radius: 8px; font-size: 14px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.err { border-color: #f85149; color: #ff7b72; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>SCO Ledger</h1>
      <p>Append-only, hash-chained entries. Phase 1 MVP.</p>
    </header>

    <div class="card">
      <form id="entry-form">
        <label for="author">Author</label>
        <input id="author" name="author" placeholder="anonymous" autocomplete="off" />
        <label for="content">Entry</label>
        <textarea id="content" name="content" rows="3" placeholder="Write something to commit to the ledger…" required></textarea>
        <button type="submit" id="submit-btn">Commit entry</button>
      </form>
    </div>

    <div class="row">
      <h2>Entries</h2>
      <button id="refresh-btn" style="background:transparent;color:var(--accent);padding:6px 10px;">Refresh</button>
    </div>
    <div id="entries"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const form = document.getElementById("entry-form");
    const entriesEl = document.getElementById("entries");
    const submitBtn = document.getElementById("submit-btn");
    const toastEl = document.getElementById("toast");

    function toast(msg, isErr) {
      toastEl.textContent = msg;
      toastEl.className = "toast show" + (isErr ? " err" : "");
      setTimeout(() => { toastEl.className = "toast"; }, 2200);
    }

    function shorten(h) {
      return h ? h.slice(0, 12) + "…" + h.slice(-8) : "";
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function renderEntries(entries) {
      if (!entries.length) {
        entriesEl.innerHTML = '<div class="empty">No entries yet. Be the first to commit one.</div>';
        return;
      }
      entriesEl.innerHTML = entries.map(e => `
        <div class="entry">
          <div class="meta">
            <span class="author">${escapeHtml(e.author)}</span>
            <span>#${e.id}</span>
            <span>${new Date(e.created_at).toLocaleString()}</span>
          </div>
          <div class="content">${escapeHtml(e.content)}</div>
          <div class="hash">hash <b>${shorten(e.hash)}</b> &nbsp;·&nbsp; prev ${shorten(e.prev_hash)}</div>
        </div>
      `).join("");
    }

    async function loadEntries() {
      try {
        const res = await fetch("/entries");
        const data = await res.json();
        renderEntries(data.entries || []);
      } catch (err) {
        toast("Failed to load entries", true);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const author = document.getElementById("author").value;
      const content = document.getElementById("content").value;
      submitBtn.disabled = true;
      try {
        const res = await fetch("/entry", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ author, content }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "Request failed");
        }
        document.getElementById("content").value = "";
        toast("Entry committed");
        await loadEntries();
      } catch (err) {
        toast(err.message, true);
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.getElementById("refresh-btn").addEventListener("click", loadEntries);
    loadEntries();
  </script>
</body>
</html>
